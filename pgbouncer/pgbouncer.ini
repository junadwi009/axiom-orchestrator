# =============================================================================
# pgbouncer.ini
# Connection pooler untuk axiom_db (axiom_memories + cryptobot_db)
# Mode: transaction pooling (default untuk async workload)
# =============================================================================

[databases]
# Format: <visible_name> = host=<...> port=<...> dbname=<...>
# Password ditarik dari userlist.txt — JANGAN hardcode di sini
axiom_memories = host=axiom_db port=5432 dbname=axiom_memories
cryptobot_db   = host=axiom_db port=5432 dbname=cryptobot_db

[pgbouncer]
# Listen di port 6432 (standar PgBouncer)
listen_addr = 0.0.0.0
listen_port = 6432

# Auth
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool mode — transaction adalah default ideal untuk asyncpg & SQLAlchemy
pool_mode = transaction

# Pool sizing (tune sesuai resource VPS Contabo VPS 30 NVMe — 12 GB RAM)
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 200
max_db_connections = 50
max_user_connections = 50

# Timeouts
server_lifetime = 3600
server_idle_timeout = 600
query_timeout = 0          # 0 = disabled, biar app yang handle timeout
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

# Stats
stats_period = 60

# Admin (untuk SHOW STATS via psql ke pgbouncer)
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin, n8n_user

# TLS/SSL antar PgBouncer dan client (di internal Docker network optional, di prod luar wajib)
# server_tls_sslmode = prefer
# client_tls_sslmode = prefer
